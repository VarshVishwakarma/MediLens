<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLens AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            red: '#ef4444',
                            pink: '#ec4899',
                            dark: '#0f172a',
                            card: 'rgba(30, 41, 59, 0.6)'
                        }
                    },
                    animation: {
                        'gradient-x': 'gradient-x 3s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                        'slide-up': 'slide-up 0.5s ease-out forwards',
                        'staggered-entry': 'slide-up 0.6s ease-out backwards',
                        'typing': 'blink 1s step-end infinite'
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' }
                        },
                        'shimmer': {
                            'from': { backgroundPosition: '200% 0' },
                            'to': { backgroundPosition: '-200% 0' }
                        },
                        'slide-up': {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        'blink': {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(236, 72, 153, 0.15);
            border-color: rgba(236, 72, 153, 0.3);
        }

        /* Dashed Border Animation */
        .dashed-border-animate {
            background-image: repeating-linear-gradient(0deg, #ec4899, #ec4899 10px, transparent 10px, transparent 20px),
                              repeating-linear-gradient(90deg, #ec4899, #ec4899 10px, transparent 10px, transparent 20px),
                              repeating-linear-gradient(180deg, #ec4899, #ec4899 10px, transparent 10px, transparent 20px),
                              repeating-linear-gradient(270deg, #ec4899, #ec4899 10px, transparent 10px, transparent 20px);
            background-size: 2px 100%, 100% 2px, 2px 100%, 100% 2px;
            background-position: 0 0, 0 0, 100% 0, 0 100%;
            background-repeat: no-repeat;
            animation: border-dance 20s infinite linear;
            border: none !important;
        }

        @keyframes border-dance {
            0% { background-position: 0 0, 0 0, 100% 0, 0 100%; }
            100% { background-position: 0 -100%, 100% 0, 100% 100%, -100% 100%; }
        }

        /* Shimmer Loading */
        .shimmer-bg {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 400% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* Ambient Background Orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            animation: float 10s infinite alternate;
        }
        
        .orb-1 { width: 400px; height: 400px; background: #ef4444; top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #ec4899; bottom: -200px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #8b5cf6; top: 40%; left: 30%; animation-duration: 15s; opacity: 0.2; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 1); }
        ::-webkit-scrollbar-thumb { background: rgba(236, 72, 153, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(236, 72, 153, 0.8); }

        /* Confidence Bar Fill */
        .progress-fill {
            transition: width 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen relative font-sans antialiased selection:bg-pink-500/30">

    <!-- Ambient Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <main class="relative z-10 container mx-auto px-4 py-12 max-w-4xl flex flex-col items-center min-h-screen justify-center">
        
        <!-- Hero Section -->
        <div class="text-center mb-12 animate-slide-up">
            <div class="inline-flex items-center justify-center p-3 rounded-2xl bg-white/5 border border-white/10 mb-6 shadow-lg shadow-pink-500/10">
                <i class="ph ph-aperture text-4xl text-pink-400"></i>
            </div>
            <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-4">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-red-500 via-pink-500 to-purple-500 animate-gradient-x drop-shadow-[0_0_15px_rgba(236,72,153,0.3)]">
                    MediLens AI
                </span>
            </h1>
            <p class="text-slate-400 text-lg md:text-xl max-w-xl mx-auto font-light">
                Intelligent prescription analysis powered by advanced OCR and AI.
            </p>
        </div>

        <!-- Main Glass Container -->
        <div class="w-full glass rounded-3xl p-6 md:p-10 animate-slide-up" style="animation-delay: 0.1s;">
            
            <!-- Upload Area -->
            <div id="dropzone" class="relative group cursor-pointer w-full rounded-2xl border-2 border-dashed border-slate-600 hover:border-transparent bg-slate-800/30 hover:bg-slate-800/50 transition-all duration-300 min-h-[250px] flex flex-col items-center justify-center overflow-hidden">
                <!-- Animated border on hover -->
                <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 dashed-border-animate pointer-events-none"></div>
                
                <input type="file" id="file-upload" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept="image/*">
                
                <div class="relative z-0 text-center p-6 transform group-hover:scale-105 transition-transform duration-300" id="upload-content">
                    <div class="w-20 h-20 mx-auto bg-gradient-to-br from-slate-700 to-slate-800 rounded-full flex items-center justify-center mb-4 group-hover:shadow-[0_0_30px_rgba(236,72,153,0.4)] transition-all duration-300 border border-slate-600 group-hover:border-pink-500/50">
                        <i class="ph ph-cloud-arrow-up text-3xl text-slate-300 group-hover:text-pink-400 transition-colors"></i>
                    </div>
                    <h3 class="text-xl font-semibold mb-2">Drop your prescription here</h3>
                    <p class="text-slate-400 text-sm mb-4">or click to browse from your device</p>
                    <span class="text-xs text-slate-500 font-medium px-3 py-1 bg-slate-800 rounded-full border border-slate-700">Supports JPG, PNG</span>
                </div>
                
                <!-- Preview Image -->
                <img id="image-preview" class="absolute inset-0 w-full h-full object-contain hidden backdrop-blur-sm bg-black/40 p-4" alt="Preview">
                <!-- Close preview button -->
                <button id="clear-image" class="hidden absolute top-4 right-4 z-20 bg-slate-900/80 hover:bg-red-500/80 text-white p-2 rounded-full backdrop-blur-md border border-white/10 transition-colors">
                    <i class="ph ph-x"></i>
                </button>
            </div>

            <!-- Scan Button -->
            <button id="scan-btn" class="w-full mt-6 bg-gradient-to-r from-red-500 to-pink-500 hover:from-red-400 hover:to-pink-400 text-white font-semibold py-4 px-8 rounded-xl shadow-[0_0_20px_rgba(236,72,153,0.3)] hover:shadow-[0_0_30px_rgba(236,72,153,0.5)] transform hover:-translate-y-1 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-3 overflow-hidden relative group">
                <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
                <i class="ph-bold ph-scan text-xl icon-default"></i>
                <i class="ph ph-spinner-gap text-xl animate-spin hidden icon-loading"></i>
                <span id="btn-text" class="relative z-10 text-lg">Analyze Prescription</span>
            </button>

            <!-- Loading State -->
            <div id="loading-state" class="hidden mt-8 w-full animate-slide-up">
                <div class="flex flex-col items-center justify-center p-8">
                    <div class="relative w-24 h-24 mb-6">
                        <div class="absolute inset-0 border-4 border-slate-700 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-pink-500 rounded-full border-t-transparent animate-spin"></div>
                        <div class="absolute inset-0 border-4 border-red-500 rounded-full border-b-transparent animate-[spin_1.5s_reverse_infinite] opacity-50"></div>
                        <i class="ph ph-brain absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-2xl text-pink-400 animate-pulse"></i>
                    </div>
                    <h3 id="loading-text" class="text-xl font-medium text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-400">Reading prescription...</h3>
                    
                    <!-- Shimmer Skeleton -->
                    <div class="w-full max-w-md mt-8 space-y-4">
                        <div class="h-4 w-3/4 bg-slate-700/50 rounded shimmer-bg mx-auto"></div>
                        <div class="h-4 w-1/2 bg-slate-700/50 rounded shimmer-bg mx-auto"></div>
                        <div class="h-20 w-full bg-slate-700/50 rounded-xl shimmer-bg mt-6"></div>
                    </div>
                </div>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden mt-8 p-4 bg-red-500/10 border border-red-500/20 rounded-xl animate-slide-up text-center">
                <i class="ph-fill ph-warning-circle text-3xl text-red-400 mb-2"></i>
                <p id="error-text" class="text-red-300 font-medium"></p>
            </div>

            <!-- Results Section -->
            <div id="results-section" class="hidden mt-10 space-y-8">
                
                <!-- AI Summary -->
                <div class="relative animate-slide-up" style="animation-delay: 0.1s;">
                    <div class="absolute -inset-1 bg-gradient-to-r from-pink-500 to-red-500 rounded-2xl blur opacity-20"></div>
                    <div class="relative bg-slate-900/80 backdrop-blur-xl border-l-4 border-l-pink-500 border-y border-r border-slate-700 rounded-xl p-6 shadow-xl">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="p-2 bg-pink-500/20 rounded-lg">
                                <i class="ph-fill ph-magic-wand text-pink-400 text-xl"></i>
                            </div>
                            <h2 class="text-xl font-semibold">AI Assistant Summary</h2>
                        </div>
                        <div id="ai-summary" class="text-slate-300 leading-relaxed font-light min-h-[60px]">
                            <!-- Typing effect goes here -->
                        </div>
                    </div>
                </div>

                <!-- Medicines Found -->
                <div class="animate-slide-up" style="animation-delay: 0.2s;">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <i class="ph-fill ph-pills text-blue-400"></i>
                        Detected Medicines
                        <span id="med-count" class="text-xs font-bold bg-blue-500/20 text-blue-300 px-2 py-1 rounded-full ml-2">0</span>
                    </h2>
                    <div id="medicines-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Cards dynamically injected here -->
                    </div>
                </div>

                <!-- Raw Text Accordion -->
                <div class="animate-slide-up" style="animation-delay: 0.3s;">
                    <button id="toggle-raw" class="w-full flex items-center justify-between p-4 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700 rounded-xl transition-colors">
                        <span class="flex items-center gap-2 text-slate-300 font-medium">
                            <i class="ph ph-text-align-left"></i> Raw OCR Extraction
                        </span>
                        <i id="raw-icon" class="ph ph-caret-down text-slate-400 transition-transform duration-300"></i>
                    </button>
                    <div id="raw-content" class="hidden mt-2 p-5 bg-slate-900/50 border border-slate-800 rounded-xl">
                        <p id="raw-text" class="text-slate-400 font-mono text-sm leading-relaxed whitespace-pre-wrap"></p>
                    </div>
                </div>

                <!-- Stats -->
                <div class="text-center text-xs text-slate-500 pt-4 border-t border-slate-800 flex justify-center items-center gap-4">
                    <span class="flex items-center gap-1"><i class="ph ph-clock"></i> <span id="proc-time">0.00</span>s</span>
                    <span>•</span>
                    <span class="flex items-center gap-1 text-green-400/70"><i class="ph ph-shield-check"></i> Secure processing</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        // DOM Elements
        const fileInput = document.getElementById('file-upload');
        const dropzone = document.getElementById('dropzone');
        const uploadContent = document.getElementById('upload-content');
        const imagePreview = document.getElementById('image-preview');
        const clearImageBtn = document.getElementById('clear-image');
        const scanBtn = document.getElementById('scan-btn');
        const btnText = document.getElementById('btn-text');
        const iconDefault = document.querySelector('.icon-default');
        const iconLoading = document.querySelector('.icon-loading');
        
        const loadingState = document.getElementById('loading-state');
        const loadingTextObj = document.getElementById('loading-text');
        const errorState = document.getElementById('error-state');
        const errorText = document.getElementById('error-text');
        const resultsSection = document.getElementById('results-section');
        
        const aiSummary = document.getElementById('ai-summary');
        const medicinesGrid = document.getElementById('medicines-grid');
        const medCount = document.getElementById('med-count');
        const toggleRawBtn = document.getElementById('toggle-raw');
        const rawContent = document.getElementById('raw-content');
        const rawText = document.getElementById('raw-text');
        const rawIcon = document.getElementById('raw-icon');
        const procTime = document.getElementById('proc-time');

        let selectedFile = null;
        let loadingInterval;

        // --- File Handling UI ---
        const handleFile = (file) => {
            if (!file || !file.type.startsWith('image/')) {
                showError("Please upload a valid image file (JPG, PNG).");
                return;
            }
            selectedFile = file;
            hideError();
            
            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.classList.remove('hidden');
                clearImageBtn.classList.remove('hidden');
                uploadContent.classList.add('opacity-0'); // Hide upload text
                dropzone.classList.remove('border-dashed', 'border-slate-600');
                dropzone.classList.add('border-pink-500/50');
            };
            reader.readAsDataURL(file);
        };

        const clearFile = (e) => {
            if(e) e.preventDefault();
            selectedFile = null;
            fileInput.value = '';
            imagePreview.src = '';
            imagePreview.classList.add('hidden');
            clearImageBtn.classList.add('hidden');
            uploadContent.classList.remove('opacity-0');
            dropzone.classList.add('border-dashed', 'border-slate-600');
            dropzone.classList.remove('border-pink-500/50');
        };

        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        clearImageBtn.addEventListener('click', clearFile);

        // --- Drag and Drop ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                if(!selectedFile) dropzone.classList.add('bg-pink-500/10', 'border-pink-500');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.remove('bg-pink-500/10', 'border-pink-500');
            }, false);
        });

        dropzone.addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]), false);

        // --- API Integration & State Logic ---
        const setLoading = (isLoading) => {
            scanBtn.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = 'Scanning...';
                iconDefault.classList.add('hidden');
                iconLoading.classList.remove('hidden');
                resultsSection.classList.add('hidden');
                errorState.classList.add('hidden');
                loadingState.classList.remove('hidden');
                
                // Dynamic text logic
                const texts = ["Enhancing image...", "Extracting raw text...", "Identifying medicines...", "Generating insights..."];
                let i = 0;
                loadingTextObj.textContent = texts[0];
                loadingInterval = setInterval(() => {
                    i = (i + 1) % texts.length;
                    loadingTextObj.textContent = texts[i];
                }, 1800);
            } else {
                btnText.textContent = 'Analyze Prescription';
                iconDefault.classList.remove('hidden');
                iconLoading.classList.add('hidden');
                loadingState.classList.add('hidden');
                clearInterval(loadingInterval);
            }
        };

        const showError = (msg) => {
            errorText.textContent = msg;
            errorState.classList.remove('hidden');
        };
        const hideError = () => errorState.classList.add('hidden');

        // Typewriter effect
        async function typeWriter(element, text, speed = 15) {
            element.innerHTML = '';
            // Add custom blinking cursor class logic if needed, simple text append for now
            for (let i = 0; i < text.length; i++) {
                if (text.charAt(i) === '\n') {
                    element.innerHTML += '<br>';
                } else {
                    element.innerHTML += text.charAt(i);
                }
                await new Promise(r => setTimeout(r, speed));
            }
        }

        const renderResults = async (data) => {
            resultsSection.classList.remove('hidden');
            
            // Stats
            procTime.textContent = data.processing_time || "0.00";
            
            // Raw Text
            rawText.textContent = data.text || "No text extracted.";
            
            // Medicines
            medicinesGrid.innerHTML = '';
            const meds = data.medicines || [];
            medCount.textContent = meds.length;

            if (meds.length === 0) {
                medicinesGrid.innerHTML = `<div class="col-span-full p-6 text-center text-slate-400 glass-card rounded-xl">No specific medicines identified.</div>`;
            } else {
                meds.forEach((med, index) => {
                    const conf = med.confidence || 0;
                    let colorClass = 'bg-green-500';
                    let glowClass = 'shadow-[0_0_15px_rgba(34,197,94,0.3)]';
                    
                    if (med.level === 'medium') { colorClass = 'bg-yellow-500'; glowClass = 'shadow-[0_0_15px_rgba(234,179,8,0.3)]'; }
                    if (med.level === 'low') { colorClass = 'bg-red-500'; glowClass = 'shadow-[0_0_15px_rgba(239,68,68,0.3)]'; }

                    const card = document.createElement('div');
                    card.className = `glass-card rounded-xl p-5 border-l-4 border-l-transparent hover:border-l-${colorClass.split('-')[1]}-500 animate-[slide-up_0.5s_ease-out_backwards]`;
                    card.style.animationDelay = `${0.3 + (index * 0.1)}s`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-lg capitalize flex items-center gap-2">
                                <i class="ph-fill ph-pill text-slate-400"></i> ${med.name}
                            </h3>
                            <span class="text-xs px-2 py-1 bg-slate-800 rounded-md font-medium text-slate-300 border border-slate-700">${conf}%</span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-1.5 mb-1 overflow-hidden">
                            <div class="${colorClass} h-1.5 rounded-full progress-fill w-0 ${conf > 80 ? glowClass : ''}"></div>
                        </div>
                        <p class="text-[10px] text-right text-slate-500 uppercase tracking-wider">${med.level} Match</p>
                    `;
                    medicinesGrid.appendChild(card);
                    
                    // Trigger width animation shortly after insertion
                    setTimeout(() => {
                        const bar = card.querySelector('.progress-fill');
                        if(bar) bar.style.width = `${conf}%`;
                    }, 50);
                });
            }

            // AI Summary Typing Effect
            const summaryText = data.summary || "No insights generated.";
            aiSummary.innerHTML = '<span class="animate-pulse text-slate-500">Generating output...</span>';
            setTimeout(() => {
                typeWriter(aiSummary, summaryText);
            }, 300);
        };

        // Submit action
        scanBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                showError("Please drop or select a prescription image first.");
                // Button bounce effect for error
                scanBtn.classList.add('animate-[shake_0.4s_ease-in-out]');
                setTimeout(() => scanBtn.classList.remove('animate-[shake_0.4s_ease-in-out]'), 400);
                return;
            }

            setLoading(true);

            try {
                const formData = new FormData();
                formData.append("image", selectedFile);

                // Make API request (assumes backend is running on same origin or CORS is setup)
                // Use relative path for production API integration
                const response = await fetch('/scan', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || "Failed to process image.");
                }

                renderResults(data);

            } catch (error) {
                showError(error.message || "A network or server error occurred.");
            } finally {
                setLoading(false);
            }
        });

        // Toggle Raw Text
        toggleRawBtn.addEventListener('click', () => {
            const isHidden = rawContent.classList.contains('hidden');
            if (isHidden) {
                rawContent.classList.remove('hidden');
                rawIcon.classList.add('rotate-180');
            } else {
                rawContent.classList.add('hidden');
                rawIcon.classList.remove('rotate-180');
            }
        });

        // Add shake keyframe for error feedback
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
